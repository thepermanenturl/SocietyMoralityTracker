<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Society Morality Tracker - Automated Unit Test Runner</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      padding: 32px;
      margin: 0;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    h1 {
      font-size: 1.4rem;
      margin-top: 0;
      color: #38bdf8;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .summary-card {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-badge {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      font-weight: bold;
    }
    .stat-badge.passed { background: rgba(16, 185, 129, 0.15); border: 1px solid #10b981; color: #34d399; }
    .stat-badge.failed { background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; color: #f87171; }
    .test-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .test-item {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .test-item.pass { border-left: 4px solid #10b981; }
    .test-item.fail { border-left: 4px solid #ef4444; }
    .run-btn {
      background: #38bdf8;
      color: #0f172a;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Society Morality Tracker — Automated Unit Test Suite</h1>
    <button class="run-btn" onclick="runTests()">Re-Run Tests</button>

    <div class="summary-card">
      <div id="passed-badge" class="stat-badge passed">Passed: 0</div>
      <div id="failed-badge" class="stat-badge failed">Failed: 0</div>
    </div>

    <div id="test-results" class="test-list"></div>
  </div>

  <script src="perspectives-data.js"></script>
  <script src="morality-data.js"></script>
  <script src="morality-store.js"></script>
  <script src="ai-vetting-engine.js"></script>
  <script src="test-suite.js"></script>

  <script>
    async function runTests() {
      const summary = await TestRunner.runAll();
      document.getElementById("passed-badge").textContent = `Passed: ${summary.passed}`;
      document.getElementById("failed-badge").textContent = `Failed: ${summary.failed}`;

      const list = document.getElementById("test-results");
      list.innerHTML = "";

      summary.results.forEach(res => {
        const div = document.createElement("div");
        div.className = `test-item ${res.success ? 'pass' : 'fail'}`;
        div.innerHTML = `<span>${res.success ? '✅' : '❌'}</span> <span>${res.message}</span>`;
        list.appendChild(div);
      });
    }

    window.onload = runTests;
  </script>
</body>
</html>
